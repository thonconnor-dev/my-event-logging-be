spring:
  datasource:
    url: jdbc:sqlite:${EVENT_LOG_DB_PATH:./event-log.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: com.example.eventlog.sqlite.SQLiteDialect
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
  mvc:
    problemdetails:
      enabled: true
logging:
  pattern:
    console: "%d{ISO_OFFSET_DATE_TIME} level=%-5level logger=%logger trace=%X{correlationId:-} %msg%n"
server:
  port: 8080
